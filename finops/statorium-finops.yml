description: Statorium is a quote-based sports-data API with no public price list. There is no metered
  pay-as-you-go surface; charges land as a fixed fee or volume contract negotiated per buyer, so the
  FOCUS-billable line is a single contracted-engagement meter until a quote is signed.
sources:
  - https://www.statorium.com/
notes: No public pricing; FinOps shape cannot be reconciled until a buyer quote defines tier, sport
  coverage, refresh rate, and unit price.
billingModel:
  pricingCategory: Contract
  billingFrequency: Per-Contract
  billingCurrency: USD
  chargeCategories:
    - Purchase
focusColumns:
  ServiceName: Statorium
  ServiceCategory: Sports Data
  ProviderName: Statorium
  PublisherName: Statorium
  InvoiceIssuerName: Statorium
  BillingCurrency: USD
meters:
  - name: contracted_engagement
    description: Placeholder for the line items defined in a Statorium buyer quote (sport coverage,
      refresh cadence, delivery format).
    unit: varies
    aggregation: sum
principles:
  - name: Visibility
    description: Visibility is whatever delivery telemetry (feed health, delay, error rates) is set
      in the quote — there is no public Statorium usage / billing API.
  - name: Allocation
    description: Allocate the Statorium subscription line in your own product / ERP cost system; tag
      by sport or product surface so renewal trade-offs are visible.
  - name: Optimization
    description: Optimization happens at quote renewal — adjust covered sports, refresh cadence, and
      delivery format (JSON / widget / plugin) to fit actual demand.
  - name: Accountability
    description: A named product / data owner should hold the Statorium subscription cost line and
      renewal review.
maintainers: []
