naftiko: 1.0.0-alpha2
info:
  label: Statorium Basketball API — Players
  description: 'Statorium Basketball API — Players. 1 operations. Lead operation: Get Basketball Player. Self-contained Naftiko
    capability covering one Statorium business surface.'
  tags:
  - Statorium
  - Players
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STATORIUM_API_KEY: STATORIUM_API_KEY
capability:
  consumes:
  - type: http
    namespace: basketball-players
    baseUri: https://api.statorium.com/api/v1
    description: Statorium Basketball API — Players business capability. Self-contained, no shared references.
    resources:
    - name: basketball-players-playerId
      path: /basketball/players/{playerId}/
      operations:
      - name: getbasketballplayer
        method: GET
        description: Get Basketball Player
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: playerId
          in: path
          type: integer
          description: The unique player identifier.
          required: true
    authentication:
      type: apikey
      key: apikey
      value: '{{env.STATORIUM_API_KEY}}'
      placement: query
  exposes:
  - type: rest
    namespace: basketball-players-rest
    port: 8080
    description: REST adapter for Statorium Basketball API — Players. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/basketball/players/{playerid}
      name: basketball-players-playerid
      description: REST surface for basketball-players-playerId.
      operations:
      - method: GET
        name: getbasketballplayer
        description: Get Basketball Player
        call: basketball-players.getbasketballplayer
        with:
          playerId: rest.playerId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: basketball-players-mcp
    port: 9090
    transport: http
    description: MCP adapter for Statorium Basketball API — Players. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: get-basketball-player
      description: Get Basketball Player
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: basketball-players.getbasketballplayer
      with:
        playerId: tools.playerId
      outputParameters:
      - type: object
        mapping: $.
