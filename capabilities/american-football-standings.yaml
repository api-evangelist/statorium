naftiko: 1.0.0-alpha2
info:
  label: Statorium American Football API — Standings
  description: 'Statorium American Football API — Standings. 1 operations. Lead operation: Get NFL Standings. Self-contained
    Naftiko capability covering one Statorium business surface.'
  tags:
  - Statorium
  - Standings
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STATORIUM_API_KEY: STATORIUM_API_KEY
capability:
  consumes:
  - type: http
    namespace: american-football-standings
    baseUri: https://api.statorium.com/api/v1
    description: Statorium American Football API — Standings business capability. Self-contained, no shared references.
    resources:
    - name: nfl-standings
      path: /nfl/standings/
      operations:
      - name: getnflstandings
        method: GET
        description: Get NFL Standings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: season
          in: query
          type: integer
          description: Season year (defaults to current season).
    authentication:
      type: apikey
      key: apikey
      value: '{{env.STATORIUM_API_KEY}}'
      placement: query
  exposes:
  - type: rest
    namespace: american-football-standings-rest
    port: 8080
    description: REST adapter for Statorium American Football API — Standings. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/nfl/standings
      name: nfl-standings
      description: REST surface for nfl-standings.
      operations:
      - method: GET
        name: getnflstandings
        description: Get NFL Standings
        call: american-football-standings.getnflstandings
        with:
          season: rest.season
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: american-football-standings-mcp
    port: 9090
    transport: http
    description: MCP adapter for Statorium American Football API — Standings. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: get-nfl-standings
      description: Get NFL Standings
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: american-football-standings.getnflstandings
      with:
        season: tools.season
      outputParameters:
      - type: object
        mapping: $.
