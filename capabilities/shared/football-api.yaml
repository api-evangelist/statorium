naftiko: "1.0.0-alpha1"

info:
  label: "Statorium Football API"
  description: "Statorium Football API providing live scores, match data, standings, teams, and players for 200+ football leagues worldwide."
  tags:
    - Football
    - Soccer
    - Sports Data
    - Live Scores
    - Statistics
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      STATORIUM_API_KEY: STATORIUM_API_KEY

capability:
  consumes:
    - type: http
      namespace: statorium-football
      baseUri: https://api.statorium.com/api/v1
      description: "Statorium Football API providing comprehensive football data including live scores, standings, and player statistics."
      authentication:
        type: apikey
        key: apikey
        value: "{{STATORIUM_API_KEY}}"
        placement: query
      resources:
        - name: leagues
          path: /leagues/
          description: "Football leagues and competitions."
          operations:
            - name: list-leagues
              method: GET
              description: "Returns all football leagues the account has permission to access."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-league
              method: GET
              description: "Returns a specific football league by ID."
              inputParameters:
                - name: leagueId
                  in: path
                  type: integer
                  required: true
                  description: "League identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: seasons
          path: /seasons/
          description: "Football seasons."
          operations:
            - name: list-seasons
              method: GET
              description: "Returns all seasons, optionally filtered by league."
              inputParameters:
                - name: leagueId
                  in: query
                  type: integer
                  required: false
                  description: "Filter by league ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: matches
          path: /matches/
          description: "Football matches and live scores."
          operations:
            - name: list-matches
              method: GET
              description: "Returns matches filtered by league, season, team, or date."
              inputParameters:
                - name: leagueId
                  in: query
                  type: integer
                  required: false
                  description: "Filter by league ID."
                - name: seasonId
                  in: query
                  type: integer
                  required: false
                  description: "Filter by season ID."
                - name: teamId
                  in: query
                  type: integer
                  required: false
                  description: "Filter by team ID."
                - name: date
                  in: query
                  type: string
                  required: false
                  description: "Filter by date (YYYY-MM-DD)."
                - name: status
                  in: query
                  type: string
                  required: false
                  description: "Filter by status: live, scheduled, finished."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-match
              method: GET
              description: "Returns full match details including lineups, events, and head-to-head."
              inputParameters:
                - name: matchId
                  in: path
                  type: integer
                  required: true
                  description: "Match identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: teams
          path: /teams/
          description: "Football teams."
          operations:
            - name: list-teams
              method: GET
              description: "Returns teams filtered by league or season."
              inputParameters:
                - name: leagueId
                  in: query
                  type: integer
                  required: false
                  description: "Filter by league ID."
                - name: seasonId
                  in: query
                  type: integer
                  required: false
                  description: "Filter by season ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-team
              method: GET
              description: "Returns detailed team information and squad."
              inputParameters:
                - name: teamId
                  in: path
                  type: integer
                  required: true
                  description: "Team identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: players
          path: /players/
          description: "Football players."
          operations:
            - name: get-player
              method: GET
              description: "Returns player profile and statistics."
              inputParameters:
                - name: playerId
                  in: path
                  type: integer
                  required: true
                  description: "Player identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: standings
          path: /standings/
          description: "Football league standings."
          operations:
            - name: get-standings
              method: GET
              description: "Returns league standings table."
              inputParameters:
                - name: leagueId
                  in: query
                  type: integer
                  required: true
                  description: "League identifier."
                - name: seasonId
                  in: query
                  type: integer
                  required: false
                  description: "Season identifier (defaults to current)."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: statorium-football-rest
      resources:
        - path: /v1/leagues
          name: leagues
          description: "Football league listings."
          operations:
            - method: GET
              name: list-leagues
              description: "List all accessible football leagues."
              call: "statorium-football.list-leagues"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/leagues/{leagueId}
          name: league
          description: "Individual league details."
          operations:
            - method: GET
              name: get-league
              description: "Get a football league by ID."
              call: "statorium-football.get-league"
              with:
                leagueId: "rest.leagueId"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/matches
          name: matches
          description: "Football match listings."
          operations:
            - method: GET
              name: list-matches
              description: "List football matches with filtering."
              call: "statorium-football.list-matches"
              with:
                leagueId: "rest.leagueId"
                seasonId: "rest.seasonId"
                teamId: "rest.teamId"
                date: "rest.date"
                status: "rest.status"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/matches/{matchId}
          name: match
          description: "Individual match details."
          operations:
            - method: GET
              name: get-match
              description: "Get a match by ID."
              call: "statorium-football.get-match"
              with:
                matchId: "rest.matchId"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/standings
          name: standings
          description: "League standings."
          operations:
            - method: GET
              name: get-standings
              description: "Get league standings."
              call: "statorium-football.get-standings"
              with:
                leagueId: "rest.leagueId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: statorium-football-mcp
      transport: http
      tools:
        - name: list-football-leagues
          description: "List all accessible football leagues."
          hints:
            readOnly: true
            openWorld: true
          call: "statorium-football.list-leagues"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-football-league
          description: "Get a football league by ID."
          hints:
            readOnly: true
            openWorld: false
          call: "statorium-football.get-league"
          with:
            leagueId: "tools.leagueId"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-football-matches
          description: "List football matches filtered by league, date, team, or status."
          hints:
            readOnly: true
            openWorld: true
          call: "statorium-football.list-matches"
          with:
            leagueId: "tools.leagueId"
            date: "tools.date"
            status: "tools.status"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-football-match
          description: "Get full match details including lineups, events, and head-to-head history."
          hints:
            readOnly: true
            openWorld: false
          call: "statorium-football.get-match"
          with:
            matchId: "tools.matchId"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-football-standings
          description: "Get league standings table for a football league."
          hints:
            readOnly: true
            openWorld: false
          call: "statorium-football.get-standings"
          with:
            leagueId: "tools.leagueId"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-football-team
          description: "Get football team details and squad."
          hints:
            readOnly: true
            openWorld: false
          call: "statorium-football.get-team"
          with:
            teamId: "tools.teamId"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-football-player
          description: "Get football player profile and statistics."
          hints:
            readOnly: true
            openWorld: false
          call: "statorium-football.get-player"
          with:
            playerId: "tools.playerId"
          outputParameters:
            - type: object
              mapping: "$."
