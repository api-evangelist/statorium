naftiko: 1.0.0-alpha2
info:
  label: Statorium Basketball API — Teams
  description: 'Statorium Basketball API — Teams. 1 operations. Lead operation: Get Basketball Team. Self-contained Naftiko
    capability covering one Statorium business surface.'
  tags:
  - Statorium
  - Teams
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STATORIUM_API_KEY: STATORIUM_API_KEY
capability:
  consumes:
  - type: http
    namespace: basketball-teams
    baseUri: https://api.statorium.com/api/v1
    description: Statorium Basketball API — Teams business capability. Self-contained, no shared references.
    resources:
    - name: basketball-teams-teamId
      path: /basketball/teams/{teamId}/
      operations:
      - name: getbasketballteam
        method: GET
        description: Get Basketball Team
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: teamId
          in: path
          type: integer
          description: The unique team identifier.
          required: true
    authentication:
      type: apikey
      key: apikey
      value: '{{env.STATORIUM_API_KEY}}'
      placement: query
  exposes:
  - type: rest
    namespace: basketball-teams-rest
    port: 8080
    description: REST adapter for Statorium Basketball API — Teams. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/basketball/teams/{teamid}
      name: basketball-teams-teamid
      description: REST surface for basketball-teams-teamId.
      operations:
      - method: GET
        name: getbasketballteam
        description: Get Basketball Team
        call: basketball-teams.getbasketballteam
        with:
          teamId: rest.teamId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: basketball-teams-mcp
    port: 9090
    transport: http
    description: MCP adapter for Statorium Basketball API — Teams. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: get-basketball-team
      description: Get Basketball Team
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: basketball-teams.getbasketballteam
      with:
        teamId: tools.teamId
      outputParameters:
      - type: object
        mapping: $.
