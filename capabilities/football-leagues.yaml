naftiko: 1.0.0-alpha2
info:
  label: Statorium Football API — Leagues
  description: 'Statorium Football API — Leagues. 2 operations. Lead operation: List All Leagues. Self-contained Naftiko capability
    covering one Statorium business surface.'
  tags:
  - Statorium
  - Leagues
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STATORIUM_API_KEY: STATORIUM_API_KEY
capability:
  consumes:
  - type: http
    namespace: football-leagues
    baseUri: https://api.statorium.com/api/v1
    description: Statorium Football API — Leagues business capability. Self-contained, no shared references.
    resources:
    - name: leagues
      path: /leagues/
      operations:
      - name: listleagues
        method: GET
        description: List All Leagues
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: leagues-leagueId
      path: /leagues/{leagueId}/
      operations:
      - name: getleague
        method: GET
        description: Get League by ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: leagueId
          in: path
          type: integer
          description: The unique identifier of the league.
          required: true
    authentication:
      type: apikey
      key: apikey
      value: '{{env.STATORIUM_API_KEY}}'
      placement: query
  exposes:
  - type: rest
    namespace: football-leagues-rest
    port: 8080
    description: REST adapter for Statorium Football API — Leagues. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/leagues
      name: leagues
      description: REST surface for leagues.
      operations:
      - method: GET
        name: listleagues
        description: List All Leagues
        call: football-leagues.listleagues
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/leagues/{leagueid}
      name: leagues-leagueid
      description: REST surface for leagues-leagueId.
      operations:
      - method: GET
        name: getleague
        description: Get League by ID
        call: football-leagues.getleague
        with:
          leagueId: rest.leagueId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: football-leagues-mcp
    port: 9090
    transport: http
    description: MCP adapter for Statorium Football API — Leagues. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-all-leagues
      description: List All Leagues
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: football-leagues.listleagues
      outputParameters:
      - type: object
        mapping: $.
    - name: get-league-id
      description: Get League by ID
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: football-leagues.getleague
      with:
        leagueId: tools.leagueId
      outputParameters:
      - type: object
        mapping: $.
