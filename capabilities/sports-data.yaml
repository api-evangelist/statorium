naftiko: 1.0.0-alpha2
info:
  label: Statorium Sports Data
  description: Unified sports data capability combining Statorium's Football, Basketball, and American Football APIs into
    a single workflow. Enables sports platforms, fantasy sports apps, and media publishers to access live scores, standings,
    match details, and news across all sports from a single integration.
  tags:
  - Sports
  - Sports Data
  - Football
  - Soccer
  - Basketball
  - American Football
  - NFL
  - NBA
  - Live Scores
  - Statistics
  created: '2026-05-02'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    STATORIUM_API_KEY: STATORIUM_API_KEY
capability:
  consumes:
  - type: http
    namespace: statorium-football
    baseUri: https://api.statorium.com/api/v1
    description: Statorium Football API providing comprehensive football data including live scores, standings, and player
      statistics.
    authentication:
      type: apikey
      key: apikey
      value: '{{STATORIUM_API_KEY}}'
      placement: query
    resources:
    - name: leagues
      path: /leagues/
      description: Football leagues and competitions.
      operations:
      - name: list-leagues
        method: GET
        description: Returns all football leagues the account has permission to access.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-league
        method: GET
        description: Returns a specific football league by ID.
        inputParameters:
        - name: leagueId
          in: path
          type: integer
          required: true
          description: League identifier.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: seasons
      path: /seasons/
      description: Football seasons.
      operations:
      - name: list-seasons
        method: GET
        description: Returns all seasons, optionally filtered by league.
        inputParameters:
        - name: leagueId
          in: query
          type: integer
          required: false
          description: Filter by league ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: matches
      path: /matches/
      description: Football matches and live scores.
      operations:
      - name: list-matches
        method: GET
        description: Returns matches filtered by league, season, team, or date.
        inputParameters:
        - name: leagueId
          in: query
          type: integer
          required: false
          description: Filter by league ID.
        - name: seasonId
          in: query
          type: integer
          required: false
          description: Filter by season ID.
        - name: teamId
          in: query
          type: integer
          required: false
          description: Filter by team ID.
        - name: date
          in: query
          type: string
          required: false
          description: Filter by date (YYYY-MM-DD).
        - name: status
          in: query
          type: string
          required: false
          description: 'Filter by status: live, scheduled, finished.'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-match
        method: GET
        description: Returns full match details including lineups, events, and head-to-head.
        inputParameters:
        - name: matchId
          in: path
          type: integer
          required: true
          description: Match identifier.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: teams
      path: /teams/
      description: Football teams.
      operations:
      - name: list-teams
        method: GET
        description: Returns teams filtered by league or season.
        inputParameters:
        - name: leagueId
          in: query
          type: integer
          required: false
          description: Filter by league ID.
        - name: seasonId
          in: query
          type: integer
          required: false
          description: Filter by season ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-team
        method: GET
        description: Returns detailed team information and squad.
        inputParameters:
        - name: teamId
          in: path
          type: integer
          required: true
          description: Team identifier.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: players
      path: /players/
      description: Football players.
      operations:
      - name: get-player
        method: GET
        description: Returns player profile and statistics.
        inputParameters:
        - name: playerId
          in: path
          type: integer
          required: true
          description: Player identifier.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: standings
      path: /standings/
      description: Football league standings.
      operations:
      - name: get-standings
        method: GET
        description: Returns league standings table.
        inputParameters:
        - name: leagueId
          in: query
          type: integer
          required: true
          description: League identifier.
        - name: seasonId
          in: query
          type: integer
          required: false
          description: Season identifier (defaults to current).
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: statorium-basketball
    baseUri: https://api.statorium.com/api/v1
    description: Statorium Basketball API for NBA and international basketball data.
    authentication:
      type: apikey
      key: apikey
      value: '{{STATORIUM_API_KEY}}'
      placement: query
    resources:
    - name: basketball-leagues
      path: /basketball/leagues/
      description: Basketball leagues.
      operations:
      - name: list-basketball-leagues
        method: GET
        description: Returns all accessible basketball leagues.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: basketball-games
      path: /basketball/games/
      description: Basketball games.
      operations:
      - name: list-basketball-games
        method: GET
        description: Returns basketball games with filtering.
        inputParameters:
        - name: leagueId
          in: query
          type: integer
          required: false
          description: Filter by league ID.
        - name: date
          in: query
          type: string
          required: false
          description: Filter by date.
        - name: status
          in: query
          type: string
          required: false
          description: Filter by status.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-basketball-game
        method: GET
        description: Returns full game details including quarter scores and player stats.
        inputParameters:
        - name: gameId
          in: path
          type: integer
          required: true
          description: Game identifier.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: basketball-standings
      path: /basketball/standings/
      description: Basketball standings.
      operations:
      - name: get-basketball-standings
        method: GET
        description: Returns basketball league standings.
        inputParameters:
        - name: leagueId
          in: query
          type: integer
          required: true
          description: League identifier.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: statorium-nfl
    baseUri: https://api.statorium.com/api/v1
    description: Statorium American Football (NFL) API.
    authentication:
      type: apikey
      key: apikey
      value: '{{STATORIUM_API_KEY}}'
      placement: query
    resources:
    - name: nfl-games
      path: /nfl/games/
      description: NFL games.
      operations:
      - name: list-nfl-games
        method: GET
        description: Returns NFL games filtered by week, season, team, or status.
        inputParameters:
        - name: week
          in: query
          type: integer
          required: false
          description: NFL week number.
        - name: season
          in: query
          type: integer
          required: false
          description: Season year.
        - name: teamId
          in: query
          type: integer
          required: false
          description: Filter by team.
        - name: status
          in: query
          type: string
          required: false
          description: Filter by status.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-nfl-game
        method: GET
        description: Returns full NFL game details.
        inputParameters:
        - name: gameId
          in: path
          type: integer
          required: true
          description: Game identifier.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: nfl-teams
      path: /nfl/teams/
      description: NFL teams.
      operations:
      - name: list-nfl-teams
        method: GET
        description: Returns all NFL teams.
        inputParameters:
        - name: conference
          in: query
          type: string
          required: false
          description: Filter by conference (AFC, NFC).
        - name: division
          in: query
          type: string
          required: false
          description: Filter by division.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: nfl-standings
      path: /nfl/standings/
      description: NFL standings.
      operations:
      - name: get-nfl-standings
        method: GET
        description: Returns NFL standings by division.
        inputParameters:
        - name: season
          in: query
          type: integer
          required: false
          description: Season year.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: nfl-news
      path: /nfl/news/
      description: NFL news.
      operations:
      - name: list-nfl-news
        method: GET
        description: Returns NFL news articles linked to players and teams.
        inputParameters:
        - name: teamId
          in: query
          type: integer
          required: false
          description: Filter by team.
        - name: playerId
          in: query
          type: integer
          required: false
          description: Filter by player.
        - name: count
          in: query
          type: integer
          required: false
          description: Number of items to return.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: statorium-sports-api
    description: Unified REST API for accessing live sports data across football, basketball, and NFL.
    resources:
    - path: /v1/leagues
      name: leagues
      description: Football league listings.
      operations:
      - method: GET
        name: list-football-leagues
        description: List all accessible football leagues.
        call: statorium-football.list-leagues
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/matches
      name: matches
      description: Football match listings and live scores.
      operations:
      - method: GET
        name: list-matches
        description: List football matches filtered by league, date, or status.
        call: statorium-football.list-matches
        with:
          leagueId: rest.leagueId
          date: rest.date
          status: rest.status
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/matches/{matchId}
      name: match
      description: Individual football match details.
      operations:
      - method: GET
        name: get-match
        description: Get football match details with lineups and head-to-head.
        call: statorium-football.get-match
        with:
          matchId: rest.matchId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/standings
      name: standings
      description: Football league standings.
      operations:
      - method: GET
        name: get-standings
        description: Get football league standings table.
        call: statorium-football.get-standings
        with:
          leagueId: rest.leagueId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/basketball/games
      name: basketball-games
      description: Basketball game listings.
      operations:
      - method: GET
        name: list-basketball-games
        description: List basketball games.
        call: statorium-basketball.list-basketball-games
        with:
          leagueId: rest.leagueId
          date: rest.date
          status: rest.status
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/nfl/games
      name: nfl-games
      description: NFL game listings.
      operations:
      - method: GET
        name: list-nfl-games
        description: List NFL games filtered by week, season, or team.
        call: statorium-nfl.list-nfl-games
        with:
          week: rest.week
          season: rest.season
          teamId: rest.teamId
          status: rest.status
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/nfl/news
      name: nfl-news
      description: NFL news feed.
      operations:
      - method: GET
        name: list-nfl-news
        description: List latest NFL news.
        call: statorium-nfl.list-nfl-news
        with:
          teamId: rest.teamId
          count: rest.count
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/nfl/standings
      name: nfl-standings
      description: NFL standings.
      operations:
      - method: GET
        name: get-nfl-standings
        description: Get NFL standings by division.
        call: statorium-nfl.get-nfl-standings
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: statorium-sports-mcp
    transport: http
    description: MCP server for AI-assisted access to live sports data across football, basketball, and NFL.
    tools:
    - name: list-football-leagues
      description: List all accessible football and soccer leagues.
      hints:
        readOnly: true
        openWorld: true
      call: statorium-football.list-leagues
      outputParameters:
      - type: object
        mapping: $.
    - name: list-football-matches
      description: List football/soccer matches filtered by league, date, team, or live status.
      hints:
        readOnly: true
        openWorld: true
      call: statorium-football.list-matches
      with:
        leagueId: tools.leagueId
        date: tools.date
        status: tools.status
      outputParameters:
      - type: object
        mapping: $.
    - name: get-football-match
      description: Get full football match details including lineups, events, stats, and head-to-head history.
      hints:
        readOnly: true
        openWorld: false
      call: statorium-football.get-match
      with:
        matchId: tools.matchId
      outputParameters:
      - type: object
        mapping: $.
    - name: get-football-standings
      description: Get the current standings table for a football league.
      hints:
        readOnly: true
        openWorld: false
      call: statorium-football.get-standings
      with:
        leagueId: tools.leagueId
      outputParameters:
      - type: object
        mapping: $.
    - name: get-football-team
      description: Get football team details including squad and statistics.
      hints:
        readOnly: true
        openWorld: false
      call: statorium-football.get-team
      with:
        teamId: tools.teamId
      outputParameters:
      - type: object
        mapping: $.
    - name: get-football-player
      description: Get football player profile and statistics.
      hints:
        readOnly: true
        openWorld: false
      call: statorium-football.get-player
      with:
        playerId: tools.playerId
      outputParameters:
      - type: object
        mapping: $.
    - name: list-basketball-games
      description: List basketball games filtered by league, date, or status.
      hints:
        readOnly: true
        openWorld: true
      call: statorium-basketball.list-basketball-games
      with:
        leagueId: tools.leagueId
        date: tools.date
        status: tools.status
      outputParameters:
      - type: object
        mapping: $.
    - name: get-basketball-game
      description: Get basketball game box score and quarter-by-quarter breakdown.
      hints:
        readOnly: true
        openWorld: false
      call: statorium-basketball.get-basketball-game
      with:
        gameId: tools.gameId
      outputParameters:
      - type: object
        mapping: $.
    - name: get-basketball-standings
      description: Get basketball league standings.
      hints:
        readOnly: true
        openWorld: false
      call: statorium-basketball.get-basketball-standings
      with:
        leagueId: tools.leagueId
      outputParameters:
      - type: object
        mapping: $.
    - name: list-nfl-games
      description: List NFL games filtered by week, season, team, or status.
      hints:
        readOnly: true
        openWorld: true
      call: statorium-nfl.list-nfl-games
      with:
        week: tools.week
        season: tools.season
        teamId: tools.teamId
        status: tools.status
      outputParameters:
      - type: object
        mapping: $.
    - name: get-nfl-game
      description: Get NFL game details including quarter scores and team statistics.
      hints:
        readOnly: true
        openWorld: false
      call: statorium-nfl.get-nfl-game
      with:
        gameId: tools.gameId
      outputParameters:
      - type: object
        mapping: $.
    - name: get-nfl-standings
      description: Get NFL standings by conference and division.
      hints:
        readOnly: true
        openWorld: false
      call: statorium-nfl.get-nfl-standings
      with:
        season: tools.season
      outputParameters:
      - type: object
        mapping: $.
    - name: list-nfl-news
      description: Get the latest NFL news linked to specific players or teams.
      hints:
        readOnly: true
        openWorld: true
      call: statorium-nfl.list-nfl-news
      with:
        teamId: tools.teamId
        count: tools.count
      outputParameters:
      - type: object
        mapping: $.
