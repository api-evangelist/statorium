naftiko: 1.0.0-alpha2
info:
  label: Statorium Football API — Players
  description: 'Statorium Football API — Players. 1 operations. Lead operation: Get Player by ID. Self-contained Naftiko capability
    covering one Statorium business surface.'
  tags:
  - Statorium
  - Players
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STATORIUM_API_KEY: STATORIUM_API_KEY
capability:
  consumes:
  - type: http
    namespace: football-players
    baseUri: https://api.statorium.com/api/v1
    description: Statorium Football API — Players business capability. Self-contained, no shared references.
    resources:
    - name: players-playerId
      path: /players/{playerId}/
      operations:
      - name: getplayer
        method: GET
        description: Get Player by ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: playerId
          in: path
          type: integer
          description: The unique identifier of the player.
          required: true
    authentication:
      type: apikey
      key: apikey
      value: '{{env.STATORIUM_API_KEY}}'
      placement: query
  exposes:
  - type: rest
    namespace: football-players-rest
    port: 8080
    description: REST adapter for Statorium Football API — Players. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/players/{playerid}
      name: players-playerid
      description: REST surface for players-playerId.
      operations:
      - method: GET
        name: getplayer
        description: Get Player by ID
        call: football-players.getplayer
        with:
          playerId: rest.playerId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: football-players-mcp
    port: 9090
    transport: http
    description: MCP adapter for Statorium Football API — Players. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: get-player-id
      description: Get Player by ID
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: football-players.getplayer
      with:
        playerId: tools.playerId
      outputParameters:
      - type: object
        mapping: $.
