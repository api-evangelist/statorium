specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Statorium
providerId: statorium
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Rate Limiting
  - Sports Data
  - Live Scores
description: Statorium does not publish rate-limit numbers, response headers, or throttling policies
  on its public site. Any per-second / per-minute ceilings, polling intervals for live scores, or daily
  call caps are set inside the negotiated quote.
sources:
  - https://www.statorium.com/
responseCodes:
  throttled: 429
limits:
  - name: Quote-Negotiated Limits
    scope: contract
    metric: varies
    limit: 'set per buyer quote; not publicly documented'
    notes: Live-score polling intervals and per-tier call caps are agreed during the quote process.
policies:
  - name: Contractual Scoping
    description: Rate, polling cadence, retry, and SLA terms are defined inside the buyer quote rather
      than in a public developer policy.
maintainers: []
