description: Statorium provides a live sports data API (JSON, HTML widgets, plugins) covering football,
  basketball, ice hockey, American football, handball, volleyball, darts and more. The site references
  "Basic" and "Premium" access levels but does not publish prices, included quotas, per-call rates,
  or rate-limit numbers. There is no free trial; pricing is quote-only and they offer a 15-day money-back
  guarantee on implementations.
sources:
  - https://www.statorium.com/
notes: Statorium publishes Basic / Premium tiers conceptually, but no public price points, included
  volumes, or per-call rates. Trimmed to a single contact-sales placeholder pending a quote.
plans:
  - id: statorium-contact-sales
    name: Contact Sales
    type: enterprise
    description: Statorium pricing is quote-only via a contact form. Access tiers (Basic / Premium)
      are referenced on the site but tier inclusions and prices are not published; sport-coverage and
      delivery format (JSON API, widget, plugin) are negotiated per buyer.
    entries:
      - label: Custom Engagement
        name: custom_engagement
        type: flat
        metric: varies
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Custom Quote
      - name: 15-Day Money-Back Guarantee
      - name: JSON API / Widget / Plugin Delivery
